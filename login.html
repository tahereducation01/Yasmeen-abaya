<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | Yasmin Abaya</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-section {
            padding: 100px 0;
            background: #FAFAFA;
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
        }

        .auth-container {
            background: var(--background);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }

        .auth-box {
            padding: 60px 40px;
            display: none;
        }

        .auth-box.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-box h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .auth-box p {
            color: #777;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border);
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: var(--secondary);
        }

        .auth-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .auth-actions a {
            color: var(--secondary);
            text-decoration: underline;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: var(--background);
            border: none;
            font-family: var(--font-body);
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .auth-btn:hover {
            background: var(--secondary);
            color: var(--primary);
        }

        .toggle-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
            color: #777;
        }

        .toggle-text a {
            color: var(--secondary);
            font-weight: 500;
            cursor: pointer;
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            .auth-box {
                padding: 40px 20px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="container" style="justify-content: center;">
            <a href="index.html" class="logo">Yasmin <span>Abaya</span></a>
        </div>
    </nav>

    <!-- Auth Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">

                <!-- Login Box -->
                <div class="auth-box active" id="login-box">
                    <h2 class="auth-title">Client Login</h2>
                    <p class="auth-subtitle">Welcome back to The House of Yasmin.</p>

                    <form onsubmit="event.preventDefault(); window.location.href='admin/index.html';">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" required>
                        </div>

                        <div class="auth-actions">
                            <label><input type="checkbox" style="accent-color: var(--primary);"> Remember me</label>
                            <a href="#">Forgot password?</a>
                        </div>

                        <button type="submit" class="auth-btn">Sign In</button>
                        
                        <div class="toggle-text">
                            New to Yasmin Abaya? <a onclick="toggleAuth('register')">Create an account</a>
                        </div>
                    </form>
                </div>

                <!-- Register Box -->
                <div class="auth-box" id="register-box">
                    <h2 class="auth-title">Create Account</h2>
                    <p class="auth-subtitle">Join our exclusive society for privileges.</p>

                    <form onsubmit="event.preventDefault(); window.location.href='index.html';">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" required>
                        </div>

                        <div class="auth-actions" style="margin-bottom: 20px;">
                            <label style="font-size: 0.8rem; line-height: 1.5; color: #666; display: flex; gap: 10px;">
                                <input type="checkbox" required style="accent-color: var(--primary); margin-top: 2px;">
                                <span>I agree to the Privacy Policy and Terms of Service of Yasmin Abaya.</span>
                            </label>
                        </div>

                        <button type="submit" class="auth-btn auth-btn-outline">Register</button>

                        <div class="toggle-text">
                            Already have an account? <a onclick="toggleAuth('login')">Sign in here</a>
                        </div>
                    </form>
                </div>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer style="padding: 40px 0; background: var(--background); border-top: 1px solid var(--border);">
        <div class="container">
            <div class="footer-bottom" style="margin-top:0; border:none; color: var(--text);">
                <p>&copy; 2026 Yasmin Abaya House. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        function toggleAuth(type) {
            document.getElementById('login-box').classList.remove('active');
            document.getElementById('register-box').classList.remove('active');
            
            if (type === 'login') {
                document.getElementById('login-box').classList.add('active');
            } else {
                document.getElementById('register-box').classList.add('active');
            }
        }
    </script>

</body>

</html>
